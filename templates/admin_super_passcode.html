{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="bg-white rounded-3xl shadow-2xl p-10">
        <div class="text-center mb-8">
            <i class="fas fa-lock text-6xl text-purple-600 mb-4"></i>
            <h1 class="text-3xl font-bold">Супер-доступ</h1>
            <p class="text-gray-600">Введіть другий код</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-6 p-4 rounded-2xl text-center
                        {% if category == 'success' %}bg-green-100 text-green-700
                        {% else %}bg-red-100 text-red-700{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="password" name="supercode" maxlength="4"
                   class="w-full text-center text-4xl tracking-widest py-6 border-2 border-gray-300 rounded-2xl focus:border-purple-600"
                   placeholder="••••" required>
            <button type="submit" 
                    class="mt-8 w-full bg-purple-600 hover:bg-purple-700 text-white py-4 rounded-2xl text-lg font-semibold">
                Відкрити панель управління
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Код: <span class="font-mono">6479</span>
        </p>
    </div>
</div>
{% endblock %}
