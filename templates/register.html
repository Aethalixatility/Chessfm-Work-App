<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - Chess School</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 to-slate-900 min-h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <i class="fas fa-chess-knight text-6xl text-blue-600 mb-4"></i>
            <h1 class="text-3xl font-bold text-gray-800">Chess School</h1>
            <p class="text-gray-600 mt-2">Реєстрація тренера</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 px-4 py-3 rounded-lg text-sm
                        {% if category == 'success' %}bg-green-100 text-green-700 border border-green-400
                        {% elif category == 'error' %}bg-red-100 text-red-700 border border-red-400
                        {% else %}bg-blue-100 text-blue-700{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">Ім'я користувача</label>
                <input type="text" name="username" required
                       class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">Пароль</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold text-lg">
                Зареєструватися
            </button>
        </form>

        <p class="text-center mt-6 text-gray-600">
            Вже маєте акаунт? <a href="{{ url_for('login') }}" class="text-blue-600 hover:underline">Увійти</a>
        </p>
    </div>
</body>
</html>
