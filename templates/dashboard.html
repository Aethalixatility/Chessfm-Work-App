<!DOCTYPE html>
<html>
<head>
    <title>Chess Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Chess School Dashboard</h1>

<div class="filters">
    <input type="date">
    <select><option>All Products</option></select>
    <select><option>All Teachers</option></select>
    <button>Refresh</button>
</div>

<div class="main">

    <div class="left">
        <div class="card">
            <h2>Lessons Overview</h2>
            <p>Total: {{ data.total_lessons }}</p>
            <p>Completed: {{ data.completed }}</p>
            <p>Cancelled: {{ data.cancelled }}</p>
        </div>

        <div class="card">
            <h2>Simple Chart</h2>
            <div class="bar completed"></div>
            <div class="bar cancelled"></div>
        </div>
    </div>

    <div class="right">
        <h2>Alerts</h2>
        {% for alert in data.alerts %}
            <div class="alert">{{ alert }}</div>
        {% endfor %}
    </div>

</div>

</body>
</html>
