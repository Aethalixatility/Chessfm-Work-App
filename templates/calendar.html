{% extends "base.html" %}
{% block content %}
<div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold mb-8">Календар</h1>
    
    <div class="bg-white rounded-2xl shadow p-8 text-center py-20">
        <i class="fas fa-calendar-alt text-8xl text-blue-200 mb-6"></i>
        <h2 class="text-2xl font-semibold mb-3">Календар уроків</h2>
        <p class="text-gray-600 max-w-md mx-auto">
            Тут буде повноцінний календар з можливістю перегляду уроків по днях.<br>
            (Можна додати пізніше FullCalendar)
        </p>
        <p class="mt-8 text-sm text-gray-500">Наразі показуємо заплановані уроки</p>
    </div>
</div>
{% endblock %}
