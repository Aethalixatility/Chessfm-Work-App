{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="bg-white rounded-3xl shadow-2xl p-10">
        <div class="text-center mb-8">
            <i class="fas fa-shield-alt text-6xl text-blue-600 mb-4"></i>
            <h1 class="text-3xl font-bold text-gray-800">Адмін-панель ChessFM</h1>
            <p class="text-gray-600 mt-2">Введіть код доступу</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-6 px-4 py-3 rounded-xl text-center
                        {% if category == 'success' %}bg-green-100 text-green-700
                        {% else %}bg-red-100 text-red-700{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="password" name="passcode" maxlength="4" 
                   class="w-full text-center text-4xl tracking-widest py-6 border-2 border-gray-300 rounded-2xl focus:border-blue-600 focus:outline-none"
                   placeholder="••••" autocomplete="off" required>
            
            <button type="submit"
                    class="mt-8 w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl text-lg font-semibold">
                Увійти в адмін-панель
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Код: <span class="font-mono">7101</span>
        </p>
    </div>
</div>
{% endblock %}
